<!DOCTYPE html>
<html>
<head>
<title>Connexion</title>

<style>
body {
    font-family: Arial;
    background: #f0f2f5;
}

.form-box {
    width: 300px;
    margin: 100px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 12px;
    background: #1877f2;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="form-box">
    <h2>Se connecter</h2>

    <form method="POST" action="/login/">
        {% csrf_token %}

        <input type="text" name="contact" placeholder="Email ou téléphone" required>
        <input type="password" name="mot_de_passe" placeholder="Mot de passe" required>

        <button type="submit">Se connecter</button>
    </form>
</div>

</body>
</html>
