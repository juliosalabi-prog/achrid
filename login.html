<!DOCTYPE html>
<html>
<head>
    <title>Connexion</title>

<body>

<h2>Se connecter</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="contact" placeholder="Email ou téléphone" required>
    <input type="password" name="mot_de_passe" placeholder="Mot de passe" required>

    <button type="submit">Se connecter</button>
</form>
